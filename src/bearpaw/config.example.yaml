device:
  port: /dev/ttyACM0
  auto_detect: true
  transport: auto
  usb_vid: 0x1965
  usb_pid: 0x0017
  usb_serial: null

api:
  host: 127.0.0.1
  port: 8000
  cors_origins:
    - http://localhost:3000

polling:
  # Fast poll rate (seconds) used while at least one WebSocket client
  # is subscribed to the "state" topic with live=true (default).
  # Clients can opt out by sending {"type": "subscribe", "topics": [...],
  # "live": false}, in which case the daemon stays on idle_sts_interval
  # even with the client connected. Useful for kiosks whose WebSocket is
  # always open but whose current view doesn't need 10 Hz updates.
  sts_interval: 0.1
  # Slow poll rate (seconds) used when no live subscriber is present
  # (either no clients connected, or all state subscribers sent
  # live=false). Defaulting to 1 Hz lets the BC125AT's backlight dim
  # between polls during unattended scanning.
  idle_sts_interval: 1.0
  reconnect_backoff: [1, 2, 5, 10, 30]

state:
  persistence: sqlite
  db_path: ./scanner.db

exporters:
  text_file:
    enabled: true
    path: ./now_scanning.txt
    blank_on_squelch_closed: false
  json_stream:
    enabled: false
    path: ./events.jsonl
    max_bytes: 10485760
    rotate_daily: true
  mqtt:
    enabled: false
    host: 127.0.0.1
    port: 1883
    topic_prefix: scanner
    qos: 0
    retain: false

analytics:
  enabled: true
  db_path: ./analytics.db
  retention_days: 30
  cleanup_interval_hours: 24
  min_hit_duration: 1.0

logging:
  level: DEBUG
  format: "%(levelname)s %(message)s"

websocket:
  ping_interval: 30
  ping_timeout: 10
