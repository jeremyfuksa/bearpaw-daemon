device:
  port: /dev/ttyACM0
  auto_detect: true
  transport: auto
  usb_vid: 0x1965
  usb_pid: 0x0017
  usb_serial: null

api:
  host: 127.0.0.1
  port: 8000
  cors_origins:
    - http://localhost:3000

polling:
  sts_interval: 0.1
  reconnect_backoff: [1, 2, 5, 10, 30]

state:
  persistence: sqlite
  db_path: ./scanner.db

exporters:
  text_file:
    enabled: true
    path: ./now_scanning.txt
    blank_on_squelch_closed: false
  json_stream:
    enabled: false
    path: ./events.jsonl
    max_bytes: 10485760
    rotate_daily: true
  mqtt:
    enabled: false
    host: 127.0.0.1
    port: 1883
    topic_prefix: scanner
    qos: 0
    retain: false

analytics:
  enabled: true
  db_path: ./analytics.db
  retention_days: 30
  cleanup_interval_hours: 24
  min_hit_duration: 1.0

logging:
  level: DEBUG
  format: "%(levelname)s %(message)s"

websocket:
  ping_interval: 30
  ping_timeout: 10

# Live HLS audio streaming from the scanner's headphone jack.
# Requires a system `ffmpeg` binary and a scanner audio feed patched
# into the host's audio input (USB audio adapter on a Pi, etc.).
# Disabled by default so existing deployments are unaffected.
audio:
  enabled: false
  # ffmpeg input format: `alsa` on Linux/Pi, `avfoundation` on macOS,
  # `dshow` on Windows.
  input_format: alsa
  # ALSA device (`hw:1,0`), AVFoundation index (`:1`), or dshow name.
  device: "hw:1,0"
  bitrate: 64           # kbps, mono AAC-LC
  sample_rate: 22050    # narrowband voice; 22050 is ample
  segment_duration: 2   # seconds per HLS segment
  buffer_segments: 15   # rolling window size (~30 sec of audio)
  # Where ffmpeg writes the playlist and segments. Recommended to
  # mount this as tmpfs on a Pi to avoid SD card wear.
  output_dir: /tmp/bearpaw-hls
  # Path to ffmpeg. If null, Bearpaw discovers it via PATH.
  ffmpeg_path: null
