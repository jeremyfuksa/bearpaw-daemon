device:
  port: null
  auto_detect: true
  transport: usb
  usb_vid: 0x1965
  usb_pid: 0x0017
  usb_serial: null

api:
  host: 127.0.0.1
  port: 8000
  cors_origins:
    - http://localhost:3000
    - http://localhost:5173
    - http://127.0.0.1:5173

polling:
  sts_interval: 0.1
  reconnect_backoff: [1, 2, 5, 10, 30]

state:
  persistence: sqlite
  db_path: ./scanner.db

exporters:
  text_file:
    enabled: true
    path: ./now_scanning.txt
    blank_on_squelch_closed: false
  json_stream:
    enabled: false
    path: ./events.jsonl
    max_bytes: 10485760
    rotate_daily: true
  mqtt:
    enabled: false
    host: 127.0.0.1
    port: 1883
    topic_prefix: scanner
    qos: 0
    retain: false
