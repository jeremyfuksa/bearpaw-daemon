name: Release to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build distributions
        run: python -m build

      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg="$(python -c 'import tomllib,sys; d=tomllib.load(open("pyproject.toml","rb")); print(d["project"]["version"])')"
          if [ "$tag" != "$pkg" ]; then
            echo "Tag v$tag does not match pyproject version $pkg" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/bearpaw-daemon/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish via PyPI trusted publisher
        uses: pypa/gh-action-pypi-publish@release/v1
