name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# As more apps move into apps/*, consider adding `paths:` filters so
# editing one app's sources doesn't re-run every job.

jobs:
  daemon-test:
    name: daemon test (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/daemon
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: apps/daemon/pyproject.toml

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        run: pytest -v --cov=bearpaw --cov-report=term --cov-fail-under=30

  daemon-lint:
    name: daemon lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/daemon
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests
